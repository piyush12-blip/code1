<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Shopify Parallax</title>
    <style>
        /* --- 1. BASE STYLES --- */
        body {
            margin: 0;
            background-color: #050508;
            overflow-x: hidden;
            font-family: sans-serif;
            color: white;
        }

        .spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            opacity: 0.5;
        }

        /* --- 2. THE STAGE (SCALED UP TO LOOK MASSIVE) --- */
        .scene {
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
            transform: scale(1.2); /* This zooms everything in to make them huge! */
        }

        /* --- 3. BACKGROUND LAYERS --- */
        .bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .bg-clouds { z-index: 1; }
        .trees { z-index: 2; }

        /* --- 4. CHARACTER GROUPS --- */
        /* Instead of boxes, they are now full-screen overlays */
        .character-group {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
        }

        /* --- 5. THE PUPPET PARTS --- */
        .part {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* Perfectly stretches your 1920x1080 canvas to the screen */
        }

        /* THE LEFT GIRL RIG */
        /* Pivot points are now based on the FULL SCREEN. (25% from left, 45% from top) */
        .girl-left-leg { z-index: 8; transform-origin: 25% 65%; }
        .girl-right-leg { z-index: 9; transform-origin: 25% 65%; }
        .girl-body { z-index: 11; transform-origin: 25% 60%; }
        .girl-arm-left { z-index: 12; transform-origin: 22% 45%; } 

        /* THE RIGHT GUY RIG */
        /* Pivot points: (75% from left, 45% from top) */
        .guy-body { z-index: 11; transform-origin: 75% 60%; }
        .guy-arm-right { z-index: 12; transform-origin: 76% 45%; }
    </style>
</head>
<body>

    <div class="spacer">Scroll Down To Begin</div>

    <div class="scene" id="mainScene">
        
        <img src="bg-clouds.jpg" class="bg-layer bg-clouds">
        <img src="trees.png" class="bg-layer trees"> 

        <div class="character-group girl-group">
            <img src="girl-right-leg.png" class="part girl-right-leg">
            <img src="girl-left-leg.png" class="part girl-left-leg">
            <img src="girl-body.png" class="part girl-body">
            <img src="girl-arm-left.png" class="part girl-arm-left">
        </div>

        <div class="character-group guy-group">
            <img src="guy-body.png" class="part guy-body">
            <img src="guy-arm-right.png" class="part guy-arm-right">
        </div>

    </div>

    <div class="spacer">Keep Scrolling</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        let tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#mainScene",
                start: "top top",
                end: "+=200%",
                scrub: 1, 
                pin: true 
            }
        });

        // 1. Environment Parallax
        tl.to(".bg-clouds", { y: "5%", scale: 1.05 }, 0)
          .to(".trees", { y: "10%", scale: 1.1 }, 0);

        // 2. Glide Full Canvases Together
        tl.to(".girl-group", { x: "10vw" }, 0)
          .to(".guy-group", { x: "-10vw" }, 0);

        // 3. The Left Girl's Movement
        tl.to(".girl-left-leg", { rotation: -5 }, 0)        
          .to(".girl-right-leg", { rotation: 3 }, 0)        
          .to(".girl-body", { rotation: 4 }, 0)        
          .to(".girl-arm-left", { rotation: -35 }, 0); 

        // 4. The Right Guy's Movement
        tl.to(".guy-body", { rotation: -4 }, 0)        
          .to(".guy-arm-right", { rotation: 35 }, 0);        

    </script>
</body>
</html>
