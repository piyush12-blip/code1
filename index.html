<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Shopify Parallax</title>
    <style>
        /* --- 1. BASE STYLES --- */
        body {
            margin: 0;
            background-color: #050508;
            overflow-x: hidden;
            font-family: sans-serif;
            color: white;
        }

        .spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            opacity: 0.5;
        }

        /* --- 2. THE STAGE --- */
        .scene {
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* --- 3. BACKGROUND LAYERS --- */
        .bg-layer {
            position: absolute;
            top: -10%; 
            left: -10%;
            width: 120%; 
            height: 120%;
            object-fit: cover;
        }
        .bg-clouds { z-index: 1; }
        .trees { z-index: 2; }

        /* --- 4. CHARACTER CONTAINERS (SUPERSIZED) --- */
        .char-container {
            position: absolute;
            top: 15vh; /* Moved to center screen */
            width: 55vw; /* MASSIVELY BIGGER! Was 40vw */
            height: 60vh;
            z-index: 10;
        }
        /* Start them a bit further off-screen so the slide-in is dramatic */
        .char-left { left: -10vw; } 
        .char-right { right: -10vw; }

        /* --- 5. THE PUPPET PARTS (The Puzzle Fix!) --- */
        .part {
            position: absolute;
            height: auto; /* Lets images keep their natural shape */
        }

        /* THE LEFT GIRL RIG */
        .girl-left-leg { 
            top: 45%; right: 5%; width: 55%;
            z-index: 8; 
            transform-origin: 50% 10%; 
        }
        .girl-right-leg { 
            top: 45%; right: -5%; width: 55%;
            z-index: 9; 
            transform-origin: 50% 10%; 
        }
        .girl-body { 
            top: 0; right: 15%; width: 75%;
            z-index: 11; 
            transform-origin: 50% 80%; 
        }
        .girl-arm-left { 
            top: 15%; right: 75%; width: 60%;
            z-index: 12; 
            transform-origin: 85% 45%; /* Shoulder joint */
        }

        /* THE RIGHT GUY RIG */
        .guy-leg { 
            top: 40%; left: 0%; width: 60%;
            z-index: 9; 
            transform-origin: 50% 10%; 
        }
        .guy-body { 
            top: 0; left: 15%; width: 70%;
            z-index: 11; 
            transform-origin: 50% 80%; 
        }
        .guy-arm { 
            top: 15%; left: 70%; width: 60%;
            z-index: 12; 
            transform-origin: 15% 45%; /* Shoulder joint */
        }
    </style>
</head>
<body>

    <div class="spacer">Scroll Down To Begin</div>

    <div class="scene" id="mainScene">
        
        <img src="bg-clouds.jpg" class="bg-layer bg-clouds">
        <img src="trees.png" class="bg-layer trees"> 

        <div class="char-container char-left">
            <img src="girl-right-leg.png" class="part girl-right-leg">
            <img src="girl-left-leg.png" class="part girl-left-leg">
            <img src="girl-body.png" class="part girl-body">
            <img src="girl-arm-left.png" class="part girl-arm-left">
        </div>

        <div class="char-container char-right">
            <img src="guy-leg.png" class="part guy-leg">
            <img src="guy-body.png" class="part guy-body">
            <img src="guy-arm.png" class="part guy-arm">
        </div>

    </div>

    <div class="spacer">Keep Scrolling</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        let tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#mainScene",
                start: "top top",
                end: "+=200%",
                scrub: 1, 
                pin: true 
            }
        });

        // 1. Environment Parallax
        tl.to(".bg-clouds", { x: "-5%", y: "5%", scale: 1.05 }, 0)
          .to(".trees", { y: "10%", scale: 1.1 }, 0);

        // 2. Glide Characters Together (Increased distance since they are bigger)
        tl.to(".char-left", { x: "22vw" }, 0)
          .to(".char-right", { x: "-22vw" }, 0);

        // 3. The Left Girl's Complex Movement
        tl.to(".girl-left-leg", { rotation: -5 }, 0)        
          .to(".girl-right-leg", { rotation: 3 }, 0)        
          .to(".girl-body", { rotation: 8 }, 0)        
          .to(".girl-arm-left", { rotation: -40 }, 0); 

        // 4. The Right Guy's Movement
        tl.to(".guy-leg", { rotation: 5 }, 0)          
          .to(".guy-body", { rotation: -8 }, 0)        
          .to(".guy-arm", { rotation: 40 }, 0);        

    </script>
</body>
</html>
